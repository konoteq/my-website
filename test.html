<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAV Phase Inverter</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 15px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>WAV 位相反転ツール</h2>
    <p>Wavファイルを選択してください</p>
    <input type="file" id="audioFile" accept=".wav"><br><br>
    <button id="processBtn" class="btn" disabled>位相を反転して保存</button>
    <div id="status"></div>
</div>

<script>
    const fileInput = document.getElementById('audioFile');
    const processBtn = document.getElementById('processBtn');
    const status = document.getElementById('status');

    fileInput.addEventListener('change', () => {
        processBtn.disabled = !fileInput.files.length;
    });

    processBtn.addEventListener('click', async () => {
        const file = fileInput.files[0];
        if (!file) return;

        status.innerText = "処理中...";
        processBtn.disabled = true;

        const arrayBuffer = await file.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        try {
            // 音声データのデコード
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            // 位相反転処理
            for (let channel = 0; channel < audioBuffer.numberOfChannels; channel++) {
                const data = audioBuffer.getChannelData(channel);
                for (let i = 0; i < data.length; i++) {
                    // 各サンプルに -1 を掛けて位相を反転
                    data[i] = data[i] * -1;
                }
            }

            // WAVフォーマットに変換
            const wavBlob = audioBufferToWav(audioBuffer);
            const url = URL.createObjectURL(wavBlob);
            
            // ダウンロードリンクの作成と実行
            const a = document.createElement('a');
            a.href = url;
            a.download = `inverted_${file.name}`;
            a.click();
            
            status.innerText = "完了しました！";
        } catch (e) {
            console.error(e);
            status.innerText = "エラーが発生しました。";
        } finally {
            processBtn.disabled = false;
        }
    });

    // AudioBufferをWAV形式（Blob）に変換する関数
    function audioBufferToWav(buffer) {
        const numOfChan = buffer.numberOfChannels,
              length = buffer.length * numOfChan * 2 + 44,
              bufferArr = new ArrayBuffer(length),
              view = new DataView(bufferArr),
              channels = [];
        let i, sample, offset = 0, pos = 0;

        // ヘッダー書き込み
        setUint32(0x46464952); // "RIFF"
        setUint32(length - 8); // ファイルサイズ
        setUint32(0x45564157); // "WAVE"
        setUint32(0x20746d66); // "fmt "
        setUint32(16);         // 長さ
        setUint16(1);          // PCM
        setUint16(numOfChan);
        setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * numOfChan);
        setUint16(numOfChan * 2);
        setUint16(16);         // 16-bit
        setUint32(0x61746164); // "data"
        setUint32(length - pos - 4);

        // チャンネルデータのインターリーブ
        for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));
        while (pos < length) {
            for (i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset]));
                sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                view.setInt16(pos, sample, true);
                pos += 2;
            }
            offset++;
        }

        return new Blob([view], { type: 'audio/wav' });

        function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
        function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }
    }
</script>

</body>
</html>
